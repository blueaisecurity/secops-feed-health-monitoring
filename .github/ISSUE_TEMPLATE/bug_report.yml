name: Bug report
description: Something isn't working as documented
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please redact `project_id`,
        `customer_id`, feed UUIDs, and any internal hostnames before
        posting logs.

        For security vulnerabilities, do **not** open a public issue —
        see [SECURITY.md](../../blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `python -m app.main`, ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (with log_level set to DEBUG if possible)
      render: shell

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.5"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / Ubuntu 22.04 / Cloud Run job"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA / version
      placeholder: "main @ abc1234"
    validations:
      required: true

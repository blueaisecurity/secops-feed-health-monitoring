name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all sources
        run: python -m compileall -q app tests

      - name: Verify config + examples load
        run: |
          cp variables.yaml.example variables.yaml
          cp feeds.yaml.example     feeds.yaml
          python - <<'PY'
          from app.config import load_config
          c = load_config()
          assert "global_settings" in c
          assert "actions" in c
          assert c["actions"]["jira"]["enabled"] is False, "jira must ship disabled"
          assert c["global_settings"]["ingestion_volume_monitor"]["enabled"] is False, \
              "ingestion_volume_monitor must ship disabled"
          print("OK — config loaded with safe defaults")
          PY

      - name: Build Docker image
        run: docker build -t feed-health-monitoring:ci .

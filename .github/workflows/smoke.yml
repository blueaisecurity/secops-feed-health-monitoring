name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all sources
        run: python -m compileall -q app tests

      - name: Verify imports + YAML examples parse
        run: |
          python - <<'PY'
          import yaml
          # The committed *.example templates must be valid YAML.
          # config.yaml itself is gitignored — config.yaml.example is the
          # template users copy from.
          for path in ("variables.yaml.example", "feeds.yaml.example", "config.yaml.example"):
              with open(path) as f:
                  yaml.safe_load(f)
              print(f"OK - {path} parses")
          # The app modules must import without errors
          import app.config
          import app.checks
          import app.actions
          import app.chronicle_client
          import app.email_client
          import app.jira_client
          import app.llm
          import app.main
          import app.sync_feeds
          import app.utils
          import app.ingestion_monitor
          print("OK - all app modules import")
          # Sanity check the shipped defaults in config.yaml.example are safe
          import yaml as _yaml
          with open("config.yaml.example") as f:
              cfg = _yaml.safe_load(f)
          assert cfg["actions"]["jira"]["enabled"] is False, "jira must ship disabled"
          assert cfg["actions"]["email"]["enabled"] is False, "email must ship disabled"
          assert cfg["global_settings"]["ingestion_volume_monitor"]["enabled"] is False, \
              "ingestion_volume_monitor must ship disabled"
          assert cfg["global_settings"]["auto_restart"]["enabled"] is False, \
              "auto_restart must ship disabled"
          assert cfg["investigation"]["llm"]["enabled"] is False, "llm must ship disabled"
          print("OK - all outbound actions ship disabled by default")
          PY

      - name: Build Docker image
        run: docker build -t feed-health-monitoring:ci .
